services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: restaurant_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:                                      # ← add this
      test: ["CMD-SHELL", "pg_isready -U user -d restaurant_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      SQLALCHEMY_DATABASE_URL: postgresql+psycopg2://user:password@db:5432/restaurant_db
      SQLALCHEMY_TEST_DATABASE_URL: postgresql+psycopg2://user:password@db:5432/test_db
      SECRET_KEY: your_secret_key_here
      ALGORITHM: HS256
    depends_on:
      db:
        condition: service_healthy              # ← wait until DB is truly ready

volumes:
  postgres_data: