{% extends 'layout.html' %}
{% block content %}
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🍕 Admin Dashboard</a>
            <a href="/" class="btn btn-outline-light btn-sm">Back to Home</a>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="fw-bold mb-4">User Management</h2>
        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Current Role</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
       async function checkAdminAndLoad() {
    const response = await fetch('/auth/me', { credentials: 'include' });
    if (response.ok) {
        const user = await response.json();
        if (user.role === 'admin') {
            loadUsers();
        } else {
            window.location.href = '/';
        }
    } else {
        window.location.href = '/auth/login';
    }
}

checkAdminAndLoad();

async function loadUsers() {
    const response = await fetch('/admin/users', { credentials: 'include' });
    if (response.ok) {
        const users = await response.json();
        const tbody = document.getElementById('user-table-body');
        tbody.innerHTML = '';
        users.forEach(u => {
            const isAdmin = u.role === 'admin';
            tbody.innerHTML += `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.username} ${u.is_superadmin ? '<span class="badge bg-dark">SUPER</span>' : ''}</td>
                    <td>${u.email}</td>
                    <td><span class="badge ${isAdmin ? 'bg-primary' : 'bg-secondary'}">${u.role}</span></td>
                    <td>
                        ${!isAdmin ?
                            `<button class="btn btn-sm btn-success me-1" onclick="promote(${u.id})">Promote</button>` :
                            `<button class="btn btn-sm btn-outline-danger me-1" onclick="demote(${u.id})">Demote</button>`
                        }
                        <button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id}, '${u.username}')">Delete</button>
                    </td>
                </tr>
            `;
        });
    } else {
        alert("Unauthorized! Admins only.");
        window.location.href = '/';
    }
}

async function promote(userId) {
    if (confirm("Promote this user to Admin?")) {
        const response = await fetch(`/admin/promote/${userId}`, {
            method: 'PUT',
            credentials: 'include'
        });
        if (response.ok) {
            loadUsers();
        } else {
            const err = await response.json();
            alert("Action Failed: " + err.detail);
        }
    }
}

async function demote(userId) {
    if (confirm("Revert this Admin back to an ordinary User?")) {
        const response = await fetch(`/admin/demote/${userId}`, {
            method: 'PUT',
            credentials: 'include'
        });
        if (response.ok) {
            loadUsers();
        } else {
            const err = await response.json();
            alert("Action Failed: " + err.detail);
        }
    }
}

async function deleteUser(userId, username) {
    if (confirm(`Are you sure you want to delete user "${username}"? This will also delete all their orders.`)) {
        try {
            const response = await fetch(`/admin/users/${userId}`, {
                method: 'DELETE',
                credentials: 'include'
            });
            if (response.status === 204) {
                alert("User and their orders deleted successfully.");
                loadUsers();
            } else {
                const errorData = await response.json();
                alert("Action Failed: " + errorData.detail);
            }
        } catch (error) {
            console.error("Delete Error:", error);
            alert("Something went wrong while trying to delete the user.");
        }
    }
}
       
    </script>
{% endblock %}
