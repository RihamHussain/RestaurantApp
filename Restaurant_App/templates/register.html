{%include 'layout.html' %}
    <!-- Simple Nav -->
    <nav class="navbar navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">🍕 RestaurantApp</a>
        </div>
    </nav>

    <div class="container register-container">
        <div class="register-card">
            <h2 class="text-center fw-bold mb-2">Create Account</h2>
            <p class="text-center text-muted mb-4">Join our community and start ordering!</p>
            
            <!-- Alert for Success/Error -->
            <div id="alert-box" class="alert d-none" role="alert"></div>

            <form id="registerForm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control" id="first_name" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="last_name" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="text" class="form-control" id="phone_number" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required minlength="6">
                </div>
                <div class="mb-4">
                    <label class="form-label">Verify Password</label>
                    <input type="password" class="form-control" id="verify_password" required minlength="6">
                </div>
                <button type="submit" class="btn btn-danger w-100 py-2 fw-bold">Sign Up</button>
            </form>

            <p class="text-center mt-4 mb-0">
                Already have an account? <a href="/auth/login" class="text-danger text-decoration-none">Login Here</a>
            </p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-5 mt-5">
        <div class="container text-center">
            <p class="mb-2">&copy; <span id="year"></span> <strong>Restaurant Management System</strong></p>
            <p class="mb-1">
                Developed by 
                <a href="https://www.linkedin.com/in/riham-a-hussain/" target="_blank" class="fw-bold text-info text-decoration-none">
                   Riham Hussain
                </a>
            </p>
            <p class="small text-secondary bridge-text">
                AI Engineer → <span class="text-info">Full Stack Engineer</span>
            </p>
        </div>
    </footer>

    <script>
        document.getElementById("year").innerHTML = new Date().getFullYear();

        const registerForm = document.getElementById('registerForm');
        const alertBox = document.getElementById('alert-box');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Prepare the JSON data based on your Create_User_Request model
            const userData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                password: document.getElementById('password').value,
                phone_number: document.getElementById('phone_number').value,
                role: "customer" // Hardcode this here too
            };

            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                if (response.ok) {
                    alertBox.className = "alert alert-success";
                    alertBox.innerText = "Registration successful! Redirecting to login...";
                    alertBox.classList.remove('d-none');
                    
                    // Redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/auth/login';
                    }, 2000);
                } else {
                    const errorData = await response.json();
                    alertBox.className = "alert alert-danger";
                    alertBox.innerText = "Error: " + (errorData.detail || "Could not register");
                    alertBox.classList.remove('d-none');
                }
            } catch (error) {
                console.error('Register Error:', error);
                alert('Something went wrong. Please try again.');
            }
        });
    </script>
