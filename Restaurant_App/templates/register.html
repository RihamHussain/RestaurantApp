{%include 'layout.html' %}
    <nav class="navbar navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">🍕 RestaurantApp</a>
        </div>
    </nav>

    <div class="container register-container">
        <div class="register-card">
            <h2 class="text-center fw-bold mb-2">Create Account</h2>
            <p class="text-center text-muted mb-4">Join our community!</p>
            
            <div id="alert-box" class="alert d-none" role="alert"></div>

            <form id="registerForm" novalidate>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control" id="first_name" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="last_name" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" required>
                        <div id="username-error" class="invalid-feedback">Username is taken.</div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                        <div id="email-error" class="invalid-feedback">Email already registered.</div>
                    </div>
                </div>

                <!-- ADDED THIS FIELD BACK - WITHOUT THIS THE SCRIPT CRASHES -->
                <div class="row">
                    <div class="col-md-12 mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="text" class="form-control" id="phone_number" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="password" required minlength="8">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Verify Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="verify_password" required>
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('verify_password', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-danger w-100 py-2 fw-bold">Sign Up</button>
            </form>
        </div>
    </div>

    <script>
    const registerForm = document.getElementById('registerForm');
    const alertBox = document.getElementById('alert-box');

    registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        console.log("Submit button clicked...");

        // 1. Reset visual states
        const inputs = registerForm.querySelectorAll('input');
        inputs.forEach(input => input.classList.remove('is-invalid'));
        alertBox.classList.add('d-none');

        // 2. Gather values
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const verifyPassword = document.getElementById('verify_password').value;
        const phone = document.getElementById('phone_number').value;

        // 3. Validation
        if (password !== verifyPassword) {
            document.getElementById('verify_password').classList.add('is-invalid');
            alertBox.className = "alert alert-danger";
            alertBox.innerText = "Passwords do not match!";
            alertBox.classList.remove('d-none');
            return;
        }

        const userData = {
            username: username,
            email: email,
            first_name: document.getElementById('first_name').value,
            last_name: document.getElementById('last_name').value,
            password: password,
            phone_number: phone,
            role: "customer"
        };

        console.log("Sending data to backend:", userData);

        try {
            const response = await fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });

            const result = await response.json();

            if (response.ok) {
                alertBox.className = "alert alert-success";
                alertBox.innerText = "Success! Redirecting...";
                alertBox.classList.remove('d-none');
                setTimeout(() => window.location.href = '/auth/login', 2000);
            } else {
                console.log("Backend error received:", result);
                const msg = result.detail;
                const lowerMsg = msg.toLowerCase();

                if (lowerMsg.includes("username")) {
                    document.getElementById('username').classList.add('is-invalid');
                    document.getElementById('username-error').innerText = msg;
                } else if (lowerMsg.includes("email")) {
                    document.getElementById('email').classList.add('is-invalid');
                    document.getElementById('email-error').innerText = msg;
                } else {
                    alertBox.className = "alert alert-danger";
                    alertBox.innerText = msg;
                    alertBox.classList.remove('d-none');
                }
            }
        } catch (error) {
            console.error("Fetch error:", error);
            alert("Connection error. Is your server running?");
        }
    });

    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('i');
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = "password";
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }
    </script>
