{%include 'layout.html' %}


    <style>
        .login-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            background: white;
        }
    </style>


    <!-- Simple Nav -->
    <nav class="navbar navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">🍕 RestaurantApp</a>
        </div>
    </nav>

    <div class="container login-container">
        <div class="login-card">
            <h2 class="text-center fw-bold mb-4">Welcome Back</h2>
            
            <!-- Alert for Errors -->
            <div id="error-alert" class="alert alert-danger d-none" role="alert">
                Invalid username or password.
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
                <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="password" name="password" required>
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

                <button type="submit" class="btn btn-danger w-100 py-2 fw-bold">Login</button>
            </form>

            <p class="text-center mt-4 mb-0">
                Don't have an account? <a href="/auth/register" class="text-danger text-decoration-none">Sign Up</a>
            </p>
        </div>
    </div>

    <!-- Footer (Using your professional branding) -->
    <footer class="bg-dark text-white py-5 mt-5">
        <div class="container text-center">
            <p class="mb-2">
                &copy; <span id="year"></span> <strong>Restaurant Management System</strong>. 
                Built with <span class="text-info">FastAPI</span>.
            </p>
            <p class="mb-1 text-light">
                Developed & Maintained by 
                <a href="https://www.linkedin.com/in/riham-a-hussain/" target="_blank" class="fw-bold text-info text-decoration-none">
                   Riham Hussain
                </a>
            </p>
            <p class="small text-secondary mb-3 bridge-text">
                Bridging the gap from <span class="text-info">AI Engineer</span> to 
                <span class="text-info">AI Software & Full Stack Engineer</span>
            </p>
        </div>
    </footer>

    <!-- JavaScript logic -->
    <script>
        // Update Year
        document.getElementById("year").innerHTML = new Date().getFullYear();

        // Handle Login
        const loginForm = document.getElementById('loginForm');
        const errorAlert = document.getElementById('error-alert');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Create form data (FastAPI OAuth2 expects x-www-form-urlencoded)
            const formData = new URLSearchParams();
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);

            try {
                const response = await fetch('/auth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    // Save the token in localStorage
                    localStorage.setItem('access_token', data.access_token);
                    // Redirect to home
                    window.location.href = '/';
                } else {
                    errorAlert.classList.remove('d-none');
                }
            } catch (error) {
                console.error('Login Error:', error);
                alert('Something went wrong. Please try again.');
            }
        });
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }
    </script>
</body>
</html>
