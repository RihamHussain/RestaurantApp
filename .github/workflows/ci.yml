name: CI Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    # This starts a real Postgres database for your tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-asyncio  # Required for your async tests

      - name: Run tests
        env:
          # This maps exactly to what your code in utils.py looks for
          # This satisfies the mandatory field in config.py
          # It doesn't have to be a real URL because tests won't use it.
          SQLALCHEMY_DATABASE_URL: "postgresql://dummy_user:dummy_pass@localhost:5432/dummy_db"
          SQLALCHEMY_TEST_DATABASE_URL: postgresql://user:password@localhost:5432/test_db
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALGORITHM: ${{ secrets.ALGORITHM }}
          RENDER: "False"
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest